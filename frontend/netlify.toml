[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Proxy API requests to EC2 backend
[[redirects]]
  from = "/api/*"
  to = "http://13.53.37.92:8080/api/v1/:splat"
  status = 200
  force = true

# SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200